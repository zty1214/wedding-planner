name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://bycqtxpugybcyhuixauc.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_aYCHRB21lXbyxhP6vJ97UQ_hlbxu0j1
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
